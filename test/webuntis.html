<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebUntis API Tester</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: rgb(14, 40, 36);
        --panel-color: rgb(18, 66, 50);
      }
      * {
        box-sizing: border-box;
        font-family: "Ubuntu Mono", monospace;
      }
      html {
        background-color: var(--bg-color);
      }
      body {
        margin: 20px;
        color: white;
      }
      .api-section {
        margin-top: 20px;
        border: 1px solid #ccc;
        padding: 20px;
      }
      h2 {
        margin-top: 0;
      }
      .dark {
        background-color: var(--panel-color);
        padding: 10px;
        border-radius: 5px;
      }
      p {
        font-size: 0.8rem;
      }
      button {
        padding: 10px;
        background-color: rgb(127, 233, 78);
        border: none;
        outline: none;
        cursor: pointer;
      }
      button:active {
        background-color: rgb(127, 233, 78, 0.8);
      }
      pre {
        background: #000000;
        padding: 10px;
        max-height: 300px;
        overflow-y: auto;
        white-space: pre-wrap;
        margin-bottom: 0;
      }
      input {
        padding: 10px;
        outline: none;
        width: 200px;
        border-radius: 0;
        border: none;
      }
    </style>
  </head>
  <body>
    <h1>WebUntis API <span class="dark">Tester</span></h1>

    <button onclick="testAllAPIs()">Test All APIs</button>
    <div id="allResults"></div>

    <div class="api-section">
      <h2>Get Status</h2>
      <button onclick="testGetStatus()">Test Get Status</button>
      <div id="getStatusResult"></div>
    </div>

    <div class="api-section">
      <h2>Get Day</h2>
      <input type="text" id="weekdayIndex" placeholder="Weekday Index (0-4)" />
      <button onclick="testGetDay()">Test Get Day</button>
      <div id="getDayResult"></div>
    </div>

    <div class="api-section">
      <h2>Get Current Day</h2>
      <button onclick="testGetCurrentDay()">Test Get Current Day</button>
      <div id="getCurrentDayResult"></div>
    </div>

    <div class="api-section">
      <h2>Get Week</h2>
      <button onclick="testGetWeek()">Test Get Week</button>
      <div id="getWeekResult"></div>
    </div>

    <div class="api-section">
      <h2>Get Current</h2>
      <input
        type="text"
        id="currentTime"
        placeholder="Current Time (optional)"
      />
      <button onclick="testGetCurrent()">Test Get Current</button>
      <div id="getCurrentResult"></div>
    </div>

    <script>
      const API_KEY = "API_KEY_HERE"; // Replace with your actual API key or use environment variable
      const HOST = `http://localhost:3000`; // Change this to your server's host if needed

      async function fetchWithKey(url) {
        return fetch(url, {
          headers: {
            "x-api-key": API_KEY,
          },
        });
      }

      function setLoading(id) {
        document.getElementById(id).innerHTML = "<p>Loading...</p>";
      }

      function setResult(id, data) {
        document.getElementById(id).innerHTML =
          "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
      }

      function setError(id, error) {
        document.getElementById(id).innerHTML =
          `<pre>Error: ${error.message}</pre>`;
      }

      async function testGetStatus() {
        const id = "getStatusResult";
        setLoading(id);

        try {
          const response = await fetchWithKey(`${HOST}/api/webuntis`);
          const data = await response.json();
          setResult(id, data);
        } catch (error) {
          setError(id, error);
        }
      }

      async function testGetDay() {
        const id = "getDayResult";
        setLoading(id);

        const weekdayIndex = document.getElementById("weekdayIndex").value;

        try {
          const response = await fetchWithKey(
            `${HOST}/api/webuntis/getDay?weekdayIndex=${weekdayIndex}`,
          );
          const data = await response.json();
          setResult(id, data);
        } catch (error) {
          setError(id, error);
        }
      }

      async function testGetCurrentDay() {
        const id = "getCurrentDayResult";
        setLoading(id);

        try {
          const response = await fetchWithKey(
            `${HOST}/api/webuntis/getCurrentDay`,
          );
          const data = await response.json();
          setResult(id, data);
        } catch (error) {
          setError(id, error);
        }
      }

      async function testGetWeek() {
        const id = "getWeekResult";
        setLoading(id);

        try {
          const response = await fetchWithKey(`${HOST}/api/webuntis/getWeek`);
          const data = await response.json();
          setResult(id, data);
        } catch (error) {
          setError(id, error);
        }
      }

      async function testGetCurrent() {
        const id = "getCurrentResult";
        setLoading(id);

        const currentTime = document.getElementById("currentTime").value;

        const url = currentTime
          ? `${HOST}/api/webuntis/getCurrent?currentTime=${encodeURIComponent(currentTime)}`
          : `${HOST}/api/webuntis/getCurrent`;

        try {
          const response = await fetchWithKey(url);
          const data = await response.json();
          setResult(id, data);
        } catch (error) {
          setError(id, error);
        }
      }

      async function testAllAPIs() {
        await testGetStatus();
        document.getElementById("weekdayIndex").value = 2;
        await testGetDay();
        await testGetCurrentDay();
        await testGetWeek();
        await testGetCurrent();
        document.getElementById("allResults").innerHTML =
          "<p>All APIs tested. Check individual results above.</p>";
      }
    </script>
  </body>
</html>
